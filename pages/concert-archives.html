<!DOCTYPE html>
<html lang="en">
<head>
    <!--#include virtual="includes/head-common.html" -->
    <meta name="data-source" content="data/concert_archive_data.json">
    <title>Concert Archives | Amateur Chamber Music Society (ACMS) Australia</title>
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen flex flex-col antialiased">

    <!--#include virtual="includes/header.html" -->
    <!-- MAIN APP CANVAS CONTAINER -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- ==================== CONCERTS TAB ==================== -->
        <section class="space-y-12">
            <!-- Navigation Sub-Menu -->
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between border-b border-stone-200 pb-4 gap-4">
                <div>
                    <h2 class="text-3xl font-serif font-bold text-stone-900">Concerts &amp; Performance Guides</h2>
                    <p class="text-stone-500 text-sm">Experience chamber performance as a listener or player.</p>
                </div>
                <div class="bg-stone-100 rounded-lg p-1 flex flex-wrap space-x-1">
                    <a href="concerts.html" class="px-4 py-2 text-xs font-semibold rounded-md text-stone-600 hover:bg-white hover:text-stone-800">2026 Planned Programs</a>
                    <a href="concert-prep-tips.html" class="px-4 py-2 text-xs font-semibold rounded-md text-stone-600 hover:bg-white hover:text-stone-800">Lorraine Moxey's Prep Tips (1992)</a>
                    <a href="concert-organiser-roles.html" class="px-4 py-2 text-xs font-semibold rounded-md text-stone-600 hover:bg-white hover:text-stone-800">Organiser Roles</a>
                    <a href="concert-archives.html" class="px-4 py-2 text-xs font-semibold rounded-md bg-white text-stone-800 shadow">Concert Archives</a>
                </div>
            </div>

            <!-- SUBCONTENT: ARCHIVES -->
            <div class="space-y-8">
                <div class="space-y-4">
                    <h3 class="text-xl font-serif font-bold text-stone-900">Concert Program Archives</h3>
                    <p class="text-sm text-stone-600">Browse through the programs from past ACMS concerts. Files are in PDF or DOC format.</p>
                    <div id="archives-container" class="space-y-8">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>

        </section>

    </main>

    <!--#include virtual="includes/footer.html" --> 

    <!-- ==================== LOGIC / JS CONTROLLERS ==================== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setActiveTab('concerts');
 
            const dataSourceMeta = document.querySelector('meta[name="data-source"]');
            const container = document.getElementById('archives-container');
 
            if (!dataSourceMeta || !container) {
                console.error('Required elements for concert archives page not found.');
                if (container) {
                    container.innerHTML = `<p class="p-4 text-center text-red-500">Page is missing required elements for script.</p>`;
                }
                return;
            }
 
            async function fetchJSON(url) {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            }
 
            async function renderArchives() {
                try {
                    const archives = await fetchJSON(dataSourceMeta.content);
 
                    if (archives.length === 0) {
                        container.innerHTML = `<p class="text-center text-stone-500">No concert archives found.</p>`;
                        return;
                    }
 
                    // Group archives by year
                    const archivesByYear = archives.reduce((acc, item) => {
                        const year = new Date(item.date).getFullYear();
                        if (!acc[year]) {
                            acc[year] = [];
                        }
                        acc[year].push(item);
                        return acc;
                    }, {});
 
                    // Get sorted years (descending)
                    const sortedYears = Object.keys(archivesByYear).sort((a, b) => b - a);
 
                    let htmlContent = '';
 
                    for (const year of sortedYears) {
                        const yearArchives = archivesByYear[year];
                        // Sort archives within the year by date descending
                        yearArchives.sort((a, b) => new Date(b.date) - new Date(a.date));
 
                        const tableRows = yearArchives.map(item => {
                            const formattedDate = new Date(item.date).toLocaleDateString('en-AU', {
                                month: 'long',
                                year: 'numeric'
                            });
 
                            const fileLinks = item.files.map(file =>
                                `<a href="${file.url}" class="text-brandGreen-700 hover:underline" target="_blank">${file.label}</a>`
                            ).join('<br>');
 
                            return `
                                <tr class="hover:bg-stone-50">
                                    <td class="p-4 align-top font-semibold text-stone-900 whitespace-nowrap">${formattedDate}</td>
                                    <td class="p-4 align-top text-xs">${item.summary}</td>
                                    <td class="p-4 align-top text-xs whitespace-nowrap">${fileLinks}</td>
                                </tr>
                            `;
                        }).join('');
 
                        htmlContent += `
                            <div class="space-y-4">
                                <h4 class="text-lg font-serif font-bold text-stone-900 border-b border-stone-200 pb-2">${year}</h4>
                                <div class="overflow-x-auto bg-white rounded-xl border border-stone-200 shadow-sm">
                                    <table class="w-full text-left border-collapse text-sm">
                                        <thead class="bg-stone-50 text-stone-500 text-xs uppercase tracking-wider">
                                            <tr>
                                                <th class="p-4 border-b">Date</th>
                                                <th class="p-4 border-b">Summary</th>
                                                <th class="p-4 border-b">Downloads</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-stone-150">
                                            ${tableRows}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        `;
                    }
 
                    container.innerHTML = htmlContent;
 
                } catch (error) {
                    console.error('Error loading concert archives:', error);
                    container.innerHTML = `<p class="p-4 text-center text-red-500">Could not load archive data. ${error.message}</p>`;
                }
            }
 
            renderArchives();
        });
    </script>
</body>
</html>
