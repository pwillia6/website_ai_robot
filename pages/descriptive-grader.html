<!DOCTYPE html>
<html lang="en">
<head>
    <!--#include virtual="includes/head-common.html" -->
    <title>Descriptive Self-Grader | Amateur Chamber Music Society (ACMS) Australia</title>
    <meta name="data-source" content="data/events-data.json">
</head>
<body class="bg-stone-50 text-stone-800 font-sans min-h-screen flex flex-col antialiased">

    <!--#include virtual="includes/header.html" -->

    <!-- MAIN APP CANVAS CONTAINER -->
    <main class="flex-grow max-w-4xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div class="mb-6">
            <a href="join.html" class="text-sm font-semibold text-brandGreen-700 hover:underline inline-flex items-center gap-2"><i class="fa-solid fa-arrow-left"></i> Back to Main Join Page</a>
        </div>

        <div class="bg-white p-6 sm:p-10 rounded-2xl border border-stone-200 shadow-sm space-y-6">
            <div>
                <h2 class="text-3xl font-serif font-bold text-stone-900">Descriptive Self-Grader</h2>
                <p class="text-stone-500 text-sm mt-2">Read the descriptions below and select the level that best fits your current playing ability. (only 5 questions)</p>
            </div>

            <div id="desc-grader-form" class="space-y-4 pt-6 border-t border-stone-100">
                <!-- Level 5 -->
                <label class="block p-4 bg-stone-50 rounded-lg border-2 border-transparent has-[:checked]:border-brandGreen-400 has-[:checked]:bg-brandGreen-50/50 cursor-pointer transition-all">
                    <div class="flex items-start sm:items-center">
                        <input type="radio" name="grade" value="5" class="form-radio text-brandGreen-600 focus:ring-brandGreen-500 h-5 w-5 mt-1 sm:mt-0">
                        <div class="ml-4">
                            <h3 class="font-bold text-stone-900">Level 5 – Getting Back Into It</h3>
                            <ul class="list-disc list-inside text-xs text-stone-600 mt-1 space-y-1">
                                <li>Took lessons previously (child or adult)</li>
                                <li>Just starting to explore chamber music repertoire</li>
                                <li>Can sight-read simple pieces at a steady pace</li>
                                <li>Prefer practising in advance</li>
                                <li>Prefer slow, steady group playing with less technical difficulty</li>
                            </ul>
                        </div>
                    </div>
                </label>
                <!-- Level 4 -->
                <label class="block p-4 bg-stone-50 rounded-lg border-2 border-transparent has-[:checked]:border-brandGreen-400 has-[:checked]:bg-brandGreen-50/50 cursor-pointer transition-all">
                    <div class="flex items-start sm:items-center">
                        <input type="radio" name="grade" value="4" class="form-radio text-brandGreen-600 focus:ring-brandGreen-500 h-5 w-5 mt-1 sm:mt-0">
                        <div class="ml-4">
                            <h3 class="font-bold text-stone-900">Level 4 – Building Confidence</h3>
                            <ul class="list-disc list-inside text-xs text-stone-600 mt-1 space-y-1">
                                <li>Had lessons and now gaining confidence</li>
                                <li>Can sight-read simple pieces with simple rhythms at a steady pace</li>
                                <li>Can mostly keep going but slow down or dip out in fast passages</li>
                                <li>Prepare dynamics and articulation in advance, not when sight-reading</li>
                                <li>Can follow a group leader in ensemble playing</li>
                            </ul>
                        </div>
                    </div>
                </label>
                <!-- Level 3 -->
                <label class="block p-4 bg-stone-50 rounded-lg border-2 border-transparent has-[:checked]:border-brandGreen-400 has-[:checked]:bg-brandGreen-50/50 cursor-pointer transition-all">
                    <div class="flex items-start sm:items-center">
                        <input type="radio" name="grade" value="3" class="form-radio text-brandGreen-600 focus:ring-brandGreen-500 h-5 w-5 mt-1 sm:mt-0">
                        <div class="ml-4">
                            <h3 class="font-bold text-stone-900">Level 3 – Intermediate Ensemble Player</h3>
                            <ul class="list-disc list-inside text-xs text-stone-600 mt-1 space-y-1">
                                <li>Learned up to AMEB Grade 5 or equivalent</li>
                                <li>Play regularly, feel confident, tone is good</li>
                                <li>Can sightread in most common keys and rhythms</li>
                                <li>Include some dynamics and articulation when sight-reading</li>
                                <li>Can play fast passages with practice</li>
                            </ul>
                        </div>
                    </div>
                </label>
                <!-- Level 2 -->
                <label class="block p-4 bg-stone-50 rounded-lg border-2 border-transparent has-[:checked]:border-brandGreen-400 has-[:checked]:bg-brandGreen-50/50 cursor-pointer transition-all">
                    <div class="flex items-start sm:items-center">
                        <input type="radio" name="grade" value="2" class="form-radio text-brandGreen-600 focus:ring-brandGreen-500 h-5 w-5 mt-1 sm:mt-0">
                        <div class="ml-4">
                            <h3 class="font-bold text-stone-900">Level 2 – Confident and Competent</h3>
                            <ul class="list-disc list-inside text-xs text-stone-600 mt-1 space-y-1">
                                <li>Took extended lessons</li>
                                <li>Practise regularly; confident and skilled</li>
                                <li>Comfortable in ensembles; can lead or follow</li>
                                <li>Confident sight-reader in all keys and time signatures</li>
                                <li>Familiar with much chamber music repertoire</li>
                            </ul>
                        </div>
                    </div>
                </label>
                <!-- Level 1 -->
                <label class="block p-4 bg-stone-50 rounded-lg border-2 border-transparent has-[:checked]:border-brandGreen-400 has-[:checked]:bg-brandGreen-50/50 cursor-pointer transition-all">
                    <div class="flex items-start sm:items-center">
                        <input type="radio" name="grade" value="1" class="form-radio text-brandGreen-600 focus:ring-brandGreen-500 h-5 w-5 mt-1 sm:mt-0">
                        <div class="ml-4">
                            <h3 class="font-bold text-stone-900">Level 1 – Advanced Amateur</h3>
                            <ul class="list-disc list-inside text-xs text-stone-600 mt-1 space-y-1">
                                <li>Studied to Grade 8 level or higher</li>
                                <li>Regular playing; strong technique and confidence, good tone.</li>
                                <li>Can sightread comfortably in all keys and complex rhythms</li>
                                <li>Naturally include dynamics, articulation, and stylistic awareness</li>
                                <li>Can lead a group confidently</li>
                                <li>Comfortable learning advanced chamber music (e.g., Ravel, Shostakovich) with preparation</li>
                            </ul>
                        </div>
                    </div>
                </label>
            </div>

            <div class="mt-6 text-center">
                <button id="show-grade-btn" class="bg-brandGreen-700 hover:bg-brandGreen-800 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition-colors">Show My Grade</button>
            </div>

            <div id="desc-grader-result" class="hidden mt-6 p-6 bg-emerald-50 border border-emerald-200 rounded-lg text-center">
                <!-- Result will be shown here by JS -->
            </div>
        </div>

    </main>

    <!--#include virtual="includes/footer.html" --> 
    <!-- ==================== LOGIC / JS CONTROLLERS ==================== -->
    <script src="js/descriptive-grader.js"></script>
</body>
</html>
